services:

  # ========================
  # MySQL
  # ========================
  mysql:
    image: mysql:8.0
    container_name: smartbank-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ducnhat12a1
      MYSQL_DATABASE: SmartBank
    ports:
      - "3307:3306"        # Map sang 3307 để tránh conflict với MySQL local
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pducnhat12a1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Redis
  # ========================
  redis:
    image: redis:7.2-alpine
    container_name: smartbank-redis
    restart: unless-stopped
    command: redis-server --requirepass NguyenLeDucNhat
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "NguyenLeDucNhat", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # Spring Boot App
  # ========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartbank-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  mysql_data:
  redis_data: